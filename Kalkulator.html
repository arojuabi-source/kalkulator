<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neon Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            overflow: hidden;
        }

        .calculator {
            background: rgba(25,25,25,0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 
                10px 10px 30px rgba(0,0,0,0.8),
                -10px -10px 20px rgba(30,30,30,0.3),
                inset 5px 5px 15px rgba(0,0,0,0.6),
                inset -5px -5px 10px rgba(40,40,40,0.2);
            width: 360px;
            border: 1px solid rgba(50,50,50,0.5);
            position: relative;
        }

        .display {
            width: 100%;
            height: 90px;
            border: none;
            border-radius: 18px;
            margin-bottom: 24px;
            text-align: right;
            font-size: 2.5em;
            padding: 0 24px;
            background: rgba(15,15,15,0.9);
            color: #ffffff;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: 1px;
            outline: none;
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.8),
                0 0 20px rgba(0,255,255,0.2);
            text-shadow: 0 0 10px rgba(0,255,255,0.4);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        button {
            height: 70px;
            font-size: 1.6em;
            font-weight: 500;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Number buttons - Dark gray */
        .number {
            background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
            color: #ffffff;
            box-shadow: 
                5px 5px 10px rgba(0,0,0,0.5),
                -5px -5px 10px rgba(35,35,35,0.3);
        }

        .number:hover {
            background: linear-gradient(145deg, #333, #262626);
            box-shadow: 
                6px 6px 15px rgba(0,0,0,0.6),
                -6px -6px 15px rgba(45,45,45,0.4),
                0 0 20px rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .number:active {
            transform: translateY(0);
            box-shadow: 
                inset 3px 3px 6px rgba(0,0,0,0.5),
                inset -3px -3px 6px rgba(25,25,25,0.4);
        }

        /* Operator buttons - Neon Glow */
        .operator {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            color: #0f0f0f;
            font-weight: 600;
            box-shadow: 
                0 0 25px rgba(0,255,255,0.5),
                inset 0 0 10px rgba(0,255,255,0.3);
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .operator:hover {
            box-shadow: 
                0 0 35px rgba(0,255,255,0.7),
                0 0 50px rgba(0,255,255,0.4),
                inset 0 0 15px rgba(0,255,255,0.4);
            transform: scale(1.05);
        }

        .operator:active {
            box-shadow: 
                0 0 15px rgba(0,255,255,0.4),
                inset 0 0 20px rgba(0,255,255,0.3);
        }

        /* Equals button - Hero Neon */
        .equal {
            grid-column: span 2;
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: #0a0a0a;
            font-weight: 700;
            font-size: 1.8em;
            box-shadow: 
                0 0 30px rgba(0,255,136,0.6),
                inset 0 0 15px rgba(0,255,136,0.4);
        }

        .equal:hover {
            box-shadow: 
                0 0 45px rgba(0,255,136,0.8),
                0 0 70px rgba(0,255,136,0.5),
                inset 0 0 20px rgba(0,255,136,0.5);
            transform: scale(1.08);
        }

        .equal:active {
            box-shadow: 
                0 0 20px rgba(0,255,136,0.5),
                inset 0 0 25px rgba(0,255,136,0.4);
        }

        /* Clear */
        .clear {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            font-weight: 600;
            box-shadow: 
                0 0 25px rgba(255,65,108,0.5),
                inset 0 0 10px rgba(255,65,108,0.3);
        }

        .clear:hover {
            box-shadow: 
                0 0 35px rgba(255,65,108,0.7),
                0 0 50px rgba(255,65,108,0.4);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .calculator {
                width: 92vw;
                padding: 24px;
            }
            .display { font-size: 2.2em; height: 80px; }
            button { height: 64px; font-size: 1.4em; }
        }
    </style>
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" class="display" value="0" readonly>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button onclick="plusMinus()">±</button>
            <button onclick="percent()">%</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            
            <button class="number" onclick="appendToDisplay('7')">7</button>
            <button class="number" onclick="appendToDisplay('8')">8</button>
            <button class="number" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="number" onclick="appendToDisplay('4')">4</button>
            <button class="number" onclick="appendToDisplay('5')">5</button>
            <button class="number" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button class="number" onclick="appendToDisplay('1')">1</button>
            <button class="number" onclick="appendToDisplay('2')">2</button>
            <button class="number" onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button class="number" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button class="number" onclick="appendToDisplay('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';
        let operator = null;
        let previousInput = null;

        function appendToDisplay(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            display.value = currentInput;
        }

        function clearDisplay() {
            currentInput = '0';
            operator = null;
            previousInput = null;
            display.value = '0';
        }

        function plusMinus() {
            if (currentInput !== '0' && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) * -1).toString();
                display.value = currentInput;
            }
        }

        function percent() {
            if (currentInput !== '0' && currentInput !== 'Error') {
                currentInput = (parseFloat(currentInput) / 100).toString();
                display.value = currentInput;
            }
        }

        function calculateResult() {
            try {
                let expression = currentInput
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/');
                
                let result = Function('"use strict";return(' + expression + ')')();
                
                if (isNaN(result) || !isFinite(result)) {
                    display.value = 'Error';
                    currentInput = 'Error';
                    setTimeout(clearDisplay, 1500);
                    return;
                }
                
                currentInput = result.toString();
                display.value = currentInput.slice(0, 12);
            } catch (error) {
                display.value = 'Error';
                currentInput = 'Error';
                setTimeout(clearDisplay, 1500);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const key = e.key;
            
            if (!isNaN(key) || key === '.') {
                appendToDisplay(key);
            } else if (['+', '-', '*', '/'].includes(key)) {
                appendToDisplay(key === '*' ? '×' : key === '/' ? '÷' : key);
            } else if (key === '%') {
                percent();
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                calculateResult();
            } else if (e.key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
